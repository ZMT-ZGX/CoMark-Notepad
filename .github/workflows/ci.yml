name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [18, 20, 22]
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

      - name: Audit dependencies
        run: npm audit --audit-level=high

  docker:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t collab-notepad .

      - name: Test Docker image
        run: |
          docker run -d --name test-app -p 8000:8000 \
            -e SESSION_SECRET=test-secret \
            -e PUBLIC_ORIGIN=http://localhost:8000 \
            collab-notepad
          sleep 5
          curl -sf http://localhost:8000/api/health || (docker logs test-app && exit 1)
          docker stop test-app
          docker rm test-app
